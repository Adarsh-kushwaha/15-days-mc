<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>JS Interview Mastery — 15-Day Plan</title>
<link href="https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&family=Syne:wght@400;600;700;800&family=JetBrains+Mono:wght@400;500;700&display=swap" rel="stylesheet">
<style>
:root {
  --bg: #080810;
  --surface: #0f0f1a;
  --surface2: #161622;
  --surface3: #1c1c2a;
  --border: #222233;
  --border2: #2a2a3d;
  --accent: #f0c040;
  --accent2: #5f8aff;
  --accent3: #ff5f7e;
  --green: #3dffa0;
  --purple: #b482ff;
  --text: #e8e8f0;
  --text2: #a0a0b8;
  --muted: #55556a;
  --radius: 10px;
  --sidebar-w: 260px;
  --header-h: 64px;
}
* { box-sizing: border-box; margin: 0; padding: 0; }
html, body { height: 100%; }
body { font-family: 'Syne', sans-serif; background: var(--bg); color: var(--text); overflow: hidden; }

/* HEADER */
header {
  position: fixed; top: 0; left: 0; right: 0;
  height: var(--header-h);
  background: var(--surface);
  border-bottom: 1px solid var(--border);
  display: flex; align-items: center;
  padding: 0 20px; gap: 20px; z-index: 200;
}
.logo { display: flex; align-items: center; gap: 10px; flex-shrink: 0; }
.logo-badge { background: var(--accent); color: #000; font-family: 'Space Mono', monospace; font-size: 10px; font-weight: 700; padding: 3px 7px; border-radius: 4px; letter-spacing: 1px; }
.logo-text { font-size: 16px; font-weight: 800; letter-spacing: -0.3px; }
.logo-text span { color: var(--accent); }
.header-stats { display: flex; gap: 12px; margin-left: auto; align-items: center; flex-wrap: wrap; }
.stat-pill { background: var(--surface2); border: 1px solid var(--border); border-radius: 999px; padding: 5px 14px; display: flex; align-items: center; gap: 8px; }
.stat-pill .slabel { color: var(--muted); font-size: 10px; text-transform: uppercase; letter-spacing: 1px; }
.stat-pill .sval { color: var(--accent); font-family: 'Space Mono', monospace; font-weight: 700; font-size: 14px; }
.global-prog-wrap { width: 140px; display: flex; flex-direction: column; gap: 3px; }
.global-prog-bar { background: var(--border); border-radius: 99px; height: 5px; overflow: hidden; }
.global-prog-fill { height: 100%; background: linear-gradient(90deg, var(--accent), var(--green)); border-radius: 99px; transition: width 0.5s ease; width: 0%; }
.prog-label { font-size: 10px; color: var(--muted); font-family: 'Space Mono', monospace; text-align: right; }

/* APP BODY */
.app-body { display: flex; position: fixed; top: var(--header-h); left: 0; right: 0; bottom: 0; }

/* LEFT SIDEBAR */
.days-sidebar { width: var(--sidebar-w); flex-shrink: 0; background: var(--surface); border-right: 1px solid var(--border); display: flex; flex-direction: column; overflow: hidden; }
.sidebar-top { padding: 14px 16px 10px; border-bottom: 1px solid var(--border); flex-shrink: 0; }
.sidebar-top-title { font-size: 10px; text-transform: uppercase; letter-spacing: 2px; color: var(--muted); margin-bottom: 10px; }
.week-filters { display: flex; gap: 5px; flex-wrap: wrap; }
.wf-btn { font-size: 10px; padding: 4px 9px; border-radius: 6px; border: 1px solid var(--border); background: transparent; color: var(--muted); cursor: pointer; transition: all 0.15s; font-family: 'Syne', sans-serif; font-weight: 600; }
.wf-btn.active { background: var(--accent); color: #000; border-color: var(--accent); }
.wf-btn:hover:not(.active) { border-color: var(--accent); color: var(--accent); }

.days-list { flex: 1; overflow-y: auto; padding: 8px; }
.days-list::-webkit-scrollbar { width: 4px; }
.days-list::-webkit-scrollbar-track { background: transparent; }
.days-list::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }

.day-item { padding: 10px 11px; border-radius: 8px; border: 1px solid transparent; cursor: pointer; transition: all 0.15s; margin-bottom: 3px; display: flex; align-items: center; gap: 10px; }
.day-item:hover { background: var(--surface2); border-color: var(--border); }
.day-item.active { background: var(--surface3); border-color: var(--accent); }
.day-item.hidden { display: none; }

.di-num { width: 34px; height: 34px; border-radius: 8px; display: flex; align-items: center; justify-content: center; font-family: 'Space Mono', monospace; font-weight: 700; font-size: 12px; flex-shrink: 0; }
.type-workday .di-num { background: var(--surface3); color: var(--text2); }
.type-wfh .di-num { background: rgba(61,255,160,0.1); color: var(--green); }
.type-weekend .di-num { background: rgba(95,138,255,0.1); color: var(--accent2); }
.day-item.active .di-num { background: var(--accent) !important; color: #000 !important; }

.di-info { flex: 1; min-width: 0; }
.di-title { font-size: 11px; font-weight: 700; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.di-meta { display: flex; align-items: center; gap: 5px; margin-top: 3px; }
.di-dayname { font-size: 10px; color: var(--muted); font-family: 'Space Mono', monospace; }
.di-badge { font-size: 9px; padding: 1px 5px; border-radius: 3px; font-weight: 700; letter-spacing: 0.3px; }
.badge-work { background: rgba(255,95,126,0.12); color: var(--accent3); }
.badge-wfh { background: rgba(61,255,160,0.1); color: var(--green); }
.badge-weekend { background: rgba(95,138,255,0.1); color: var(--accent2); }

.di-ring { flex-shrink: 0; position: relative; width: 28px; height: 28px; }
.di-ring svg { transform: rotate(-90deg); }
.ring-bg2 { fill: none; stroke: var(--border); stroke-width: 2.5; }
.ring-fill2 { fill: none; stroke-width: 2.5; stroke-linecap: round; transition: stroke-dashoffset 0.4s; }
.ring-pct { position: absolute; inset: 0; display: flex; align-items: center; justify-content: center; font-family: 'Space Mono', monospace; font-size: 7px; }

/* Sidebar footer */
.sidebar-footer { border-top: 1px solid var(--border); padding: 10px 14px; display: flex; flex-direction: column; gap: 5px; flex-shrink: 0; }
.leg-item { display: flex; align-items: center; gap: 7px; font-size: 10px; color: var(--muted); }
.leg-dot { width: 8px; height: 8px; border-radius: 50%; flex-shrink: 0; }

/* DETAIL PANEL */
.detail-panel { flex: 1; overflow-y: auto; background: var(--bg); }
.detail-panel::-webkit-scrollbar { width: 5px; }
.detail-panel::-webkit-scrollbar-track { background: transparent; }
.detail-panel::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }
.detail-inner { max-width: 860px; margin: 0 auto; padding: 28px 32px 48px; }

.empty-state { display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100%; gap: 12px; color: var(--muted); }
.empty-icon { font-size: 48px; opacity: 0.3; }
.empty-text { font-size: 14px; }

/* Day header */
.detail-day-header { display: flex; align-items: flex-start; justify-content: space-between; margin-bottom: 24px; gap: 16px; flex-wrap: wrap; }
.detail-day-label { font-size: 11px; text-transform: uppercase; letter-spacing: 2px; color: var(--muted); margin-bottom: 6px; display: flex; align-items: center; gap: 8px; }
.detail-day-title { font-size: 24px; font-weight: 800; letter-spacing: -0.5px; line-height: 1.2; }
.detail-day-sub { margin-top: 8px; display: flex; align-items: center; gap: 8px; flex-wrap: wrap; }
.big-badge { font-size: 11px; padding: 4px 10px; border-radius: 6px; font-weight: 700; letter-spacing: 0.5px; }

.detail-ring { position: relative; width: 70px; height: 70px; flex-shrink: 0; }
.detail-ring svg { transform: rotate(-90deg); }
.detail-ring-bg { fill: none; stroke: var(--border); stroke-width: 4; }
.detail-ring-fill { fill: none; stroke-width: 4; stroke-linecap: round; transition: stroke-dashoffset 0.5s; }
.detail-ring-text { position: absolute; inset: 0; display: flex; align-items: center; justify-content: center; font-family: 'Space Mono', monospace; font-weight: 700; font-size: 14px; }

/* Why block */
.why-block { margin-top: 10px; font-size: 12px; color: var(--text2); background: var(--surface); border: 1px solid var(--border); border-left: 3px solid var(--accent); padding: 9px 12px; border-radius: 6px; line-height: 1.5; }

/* Section heads */
.section-head { font-size: 10px; text-transform: uppercase; letter-spacing: 2px; color: var(--muted); margin: 22px 0 10px; display: flex; align-items: center; gap: 10px; }
.section-head::after { content: ''; flex: 1; height: 1px; background: var(--border); }

/* Schedule */
.schedule-grid { display: flex; flex-direction: column; gap: 6px; }
.sched-block { background: var(--surface); border: 1px solid var(--border); border-radius: 8px; padding: 11px 14px; display: flex; gap: 12px; align-items: flex-start; }
.sched-dur { font-family: 'JetBrains Mono', monospace; font-size: 11px; color: var(--accent); white-space: nowrap; min-width: 48px; background: rgba(240,192,64,0.08); border-radius: 5px; padding: 2px 7px; text-align: center; flex-shrink: 0; margin-top: 2px; }
.sched-title { font-size: 13px; font-weight: 700; margin-bottom: 2px; }
.sched-desc { font-size: 12px; color: var(--text2); line-height: 1.5; }

/* Topics */
.topics-grid { display: flex; flex-direction: column; gap: 6px; }
.topic-item { background: var(--surface); border: 1px solid var(--border); border-radius: 8px; padding: 12px 14px; cursor: pointer; transition: all 0.15s; display: flex; gap: 12px; align-items: flex-start; }
.topic-item:hover { border-color: var(--border2); }
.topic-item.checked { background: rgba(61,255,160,0.04); border-color: rgba(61,255,160,0.2); }
.topic-item.imp { border-left: 3px solid var(--accent3); }
.topic-item.imp.checked { border-left: 3px solid var(--green); }
.topic-checkbox { width: 18px; height: 18px; border-radius: 5px; border: 2px solid var(--border2); flex-shrink: 0; display: flex; align-items: center; justify-content: center; margin-top: 2px; transition: all 0.15s; }
.topic-item.checked .topic-checkbox { background: var(--green); border-color: var(--green); color: #000; }
.chk-icon { display: none; }
.topic-item.checked .chk-icon { display: block; }
.topic-body { flex: 1; }
.topic-name-row { display: flex; align-items: center; gap: 7px; flex-wrap: wrap; margin-bottom: 4px; }
.topic-name { font-size: 13px; font-weight: 700; }
.imp-star { font-size: 9px; font-weight: 800; letter-spacing: 0.5px; background: rgba(255,95,126,0.15); color: var(--accent3); border: 1px solid rgba(255,95,126,0.25); padding: 1px 6px; border-radius: 3px; }
.poly-badge { font-size: 9px; background: rgba(240,192,64,0.12); color: var(--accent); border: 1px solid rgba(240,192,64,0.25); padding: 1px 5px; border-radius: 3px; font-family: 'JetBrains Mono', monospace; font-weight: 700; letter-spacing: 0.5px; }
.topic-tags { display: flex; gap: 5px; flex-wrap: wrap; margin-bottom: 5px; }
.ttag { font-size: 10px; padding: 2px 7px; border-radius: 4px; font-family: 'JetBrains Mono', monospace; }
.ttag-core { background: rgba(240,192,64,0.1); color: var(--accent); }
.ttag-advanced { background: rgba(255,95,126,0.1); color: var(--accent3); }
.ttag-practical { background: rgba(95,138,255,0.1); color: var(--accent2); }
.ttag-browser { background: rgba(61,255,160,0.1); color: var(--green); }
.ttag-htmlcss { background: rgba(180,130,255,0.1); color: var(--purple); }
.topic-note { font-size: 12px; color: var(--text2); line-height: 1.5; }
.subtopics { margin-top: 8px; padding-top: 8px; border-top: 1px solid var(--border); display: flex; flex-direction: column; gap: 3px; }
.st-item { font-size: 11px; color: var(--text2); display: flex; gap: 7px; align-items: flex-start; padding: 2px 0; }
.st-dot { color: var(--muted); flex-shrink: 0; }

/* Resources */
.resources { display: flex; gap: 7px; flex-wrap: wrap; }
.res-link { font-size: 11px; padding: 5px 11px; border-radius: 6px; background: var(--surface); border: 1px solid var(--border); color: var(--accent2); text-decoration: none; font-family: 'JetBrains Mono', monospace; transition: all 0.15s; }
.res-link:hover { border-color: var(--accent2); }

/* Notes & Mood */
.notes-area { width: 100%; background: var(--surface); border: 1px solid var(--border); border-radius: 8px; padding: 12px; color: var(--text); font-family: 'JetBrains Mono', monospace; font-size: 12px; resize: vertical; min-height: 80px; outline: none; transition: border-color 0.15s; line-height: 1.6; }
.notes-area:focus { border-color: var(--accent); }
.notes-area::placeholder { color: var(--muted); }
.mood-row { display: flex; gap: 7px; flex-wrap: wrap; }
.mood-btn { padding: 6px 13px; border-radius: 8px; border: 1px solid var(--border); background: var(--surface); font-size: 12px; cursor: pointer; transition: all 0.15s; display: flex; align-items: center; gap: 6px; font-family: 'Syne', sans-serif; color: var(--text2); }
.mood-btn.selected { border-color: var(--accent); background: rgba(240,192,64,0.08); color: var(--accent); }

/* Toast */
.toast { position: fixed; bottom: 20px; right: 20px; background: var(--green); color: #000; padding: 9px 16px; border-radius: 8px; font-size: 12px; font-weight: 700; font-family: 'Space Mono', monospace; opacity: 0; transform: translateY(8px); transition: all 0.25s; z-index: 9999; pointer-events: none; }
.toast.show { opacity: 1; transform: translateY(0); }

@keyframes fadeIn { from { opacity: 0; transform: translateY(6px); } to { opacity: 1; transform: translateY(0); } }
.anim { animation: fadeIn 0.2s ease; }
</style>
</head>
<body>

<header>
  <div class="logo">
    <div class="logo-badge">15 DAYS</div>
    <div class="logo-text">JS <span>Mastery</span> Planner</div>
  </div>
  <div class="header-stats">
    <div class="stat-pill"><span class="slabel">Topics</span><span class="sval" id="stat-topics">0/0</span></div>
    <div class="stat-pill"><span class="slabel">Days Done</span><span class="sval" id="stat-days">0/15</span></div>
    <div class="global-prog-wrap">
      <div class="prog-label" id="prog-pct">0%</div>
      <div class="global-prog-bar"><div class="global-prog-fill" id="global-bar"></div></div>
    </div>
  </div>
</header>

<div class="app-body">
  <aside class="days-sidebar">
    <div class="sidebar-top">
      <div class="sidebar-top-title">15-Day Battle Plan</div>
      <div class="week-filters">
        <button class="wf-btn active" onclick="filterWeek('all',this)">All</button>
        <button class="wf-btn" onclick="filterWeek(1,this)">Week 1</button>
        <button class="wf-btn" onclick="filterWeek(2,this)">Week 2</button>
        <button class="wf-btn" onclick="filterWeek(3,this)">Day 15</button>
      </div>
    </div>
    <div class="days-list" id="days-list"></div>
    <div class="sidebar-footer">
      <div class="leg-item"><div class="leg-dot" style="background:var(--border2)"></div>Mon–Thu · 3h study</div>
      <div class="leg-item"><div class="leg-dot" style="background:var(--green)"></div>Friday WFH · 4h study</div>
      <div class="leg-item"><div class="leg-dot" style="background:var(--accent2)"></div>Weekend · 8h study</div>
    </div>
  </aside>

  <div class="detail-panel" id="detail-panel">
    <div class="empty-state" id="empty-state">
      <div class="empty-icon">📅</div>
      <div class="empty-text">Pick a day from the sidebar</div>
    </div>
    <div id="detail-inner" style="display:none"></div>
  </div>
</div>

<div class="toast" id="toast">✓ Saved</div>

<script>
// ═══════════════════════════════════════════════
// DATA — Priority-ordered for SDE2 JS interview
// ═══════════════════════════════════════════════
const PLAN = [
  {
    day:1, dayName:"Monday", type:"workday",
    title:"Execution Context & Hoisting",
    why:"Foundation of all JS. Every other concept (closures, async, this) builds on execution context. Start here, never skip.",
    schedule:[
      {dur:"1.5h", title:"Execution Context & Call Stack", desc:"Global EC, function EC, creation vs execution phase. Draw the call stack for nested functions."},
      {dur:"1h", title:"Hoisting — var / let / const / functions", desc:"What gets hoisted, TDZ for let/const, function declarations vs expressions."},
      {dur:"0.5h", title:"Job Applications", desc:"Apply to 3–5 roles. Tailor keywords to JD."},
    ],
    topics:[
      {id:"d1t1", name:"Execution Context & Call Stack", tag:"core", imp:true,
       note:"Interviewers ask 'explain how JS executes this code'. Know this diagram cold.",
       sub:["Global EC created when script runs","Function EC pushed on each fn call","EC has 2 phases: Creation (memory allocation) and Execution (code runs)","Call stack is LIFO — last in, first out","Stack overflow = infinite recursion filling the stack"]},
      {id:"d1t2", name:"Hoisting", tag:"core", imp:true,
       note:"Most interviews open with a hoisting output puzzle. Never get it wrong.",
       sub:["var: hoisted + initialised to undefined","let/const: hoisted BUT not initialised → TDZ","Function declarations: fully hoisted (name + body)","Function expressions: treated like var — only declaration hoisted","Class declarations: hoisted but TDZ applies (like let)"]},
      {id:"d1t3", name:"Temporal Dead Zone (TDZ)", tag:"core", imp:true,
       note:"Why does accessing let before declaration throw ReferenceError and not undefined?",
       sub:["TDZ = gap between hoisting and initialisation line","Accessing in TDZ → ReferenceError (NOT undefined)","Even typeof on a TDZ variable throws","Applies to let, const, class","Common trap: using let in a function before it's declared"]},
      {id:"d1t4", name:"var vs let vs const — All Differences", tag:"core", imp:true,
       note:"Classic table question. Know all 5 differences.",
       sub:["var: function-scoped, re-declarable, re-assignable, initialised to undefined","let: block-scoped, not re-declarable, re-assignable, TDZ","const: block-scoped, not re-declarable, not re-assignable, TDZ","const object properties CAN be mutated — only the binding is const","Classic trap: var in for-loop + setTimeout shares one binding"]},
      {id:"d1t5", name:"Scope & Scope Chain", tag:"core", imp:false,
       note:"Lexical scope = determined at write time. Scope chain = how JS looks up variables.",
       sub:["Global, function, block scope","Lexical scope: inner fn can access outer vars, not vice versa","Scope chain walks outward until global scope","IIFE pattern for scope isolation","Module scope in ES6 modules"]},
    ],
    resources:[{label:"JS Visualizer 9000", url:"https://www.jsv9000.app/"},{label:"MDN Hoisting", url:"https://developer.mozilla.org/en-US/docs/Glossary/Hoisting"}]
  },
  {
    day:2, dayName:"Tuesday", type:"workday",
    title:"Closures — Most Asked JS Topic",
    why:"Closures appear in 90%+ of JS interviews. Understand the mechanism deeply, not just 'function inside function'.",
    schedule:[
      {dur:"1.5h", title:"Closures — mechanism, memory, patterns", desc:"How closure captures lexical env. Stale closure. Counter, once(), memoize, module pattern."},
      {dur:"1h", title:"Currying & Partial Application", desc:"Write curry(fn). Partial application. Common interview coding question."},
      {dur:"0.5h", title:"Job Applications", desc:"Apply to 3–5 roles."},
    ],
    topics:[
      {id:"d2t1", name:"What is a Closure", tag:"core", imp:true,
       note:"Function + its lexical environment. Created every time a function is created.",
       sub:["Closure = function bundled with reference to its outer scope","Inner function retains access to outer vars AFTER outer function returns","Closed-over variables stay in memory as long as closure exists","Every function in JS is technically a closure","Interview: 'What is a closure?' — don't just say 'function inside function'"]},
      {id:"d2t2", name:"Closure Patterns (coding)", tag:"practical", imp:true,
       note:"These appear directly as coding questions. Write each one from scratch.",
       sub:["Counter with private state (encapsulation)","once(fn): runs only first time, returns same result after","memoize(fn): cache results using closure Map","Module pattern: IIFE returning public API","Partial application using closure"]},
      {id:"d2t3", name:"Closure in Loops — The var Trap", tag:"core", imp:true,
       note:"Most common closure output puzzle. Interviewers always use this.",
       sub:["var in for loop: all callbacks share same 'i' binding → all log same value","Fix 1: use let (creates new binding per iteration)","Fix 2: IIFE inside loop to create new scope","Fix 3: forEach — each call is a new function scope","Always test yourself: setTimeout in for-loop with var vs let"]},
      {id:"d2t4", name:"Stale Closures", tag:"advanced", imp:false,
       note:"Common React bug. Handler closes over old state value.",
       sub:["Closure captures value at time of creation, not current value","React useEffect with stale state: handler uses initial state, not updated","Fix: dependency array, useRef, or pass value as argument","Interview: explain a React bug caused by stale closure"]},
      {id:"d2t5", name:"Currying", tag:"advanced", imp:true,
       note:"Write curry(fn) that converts f(a,b,c) → f(a)(b)(c). Very frequently asked.",
       sub:["Currying: transform multi-arg fn into chain of single-arg fns","Partial application: fix some args, return fn expecting rest","curry() implementation: check args.length vs fn.length, recurse","Use case: reusable configured functions, point-free style","Difference: currying = always 1 arg per call. Partial = any number."]},
    ],
    resources:[{label:"MDN Closures", url:"https://developer.mozilla.org/en-US/docs/Web/JavaScript/Closures"}]
  },
  {
    day:3, dayName:"Wednesday", type:"workday",
    title:"this Keyword + call / apply / bind Polyfills",
    why:"Top-3 most asked JS concept. Mastering 'this' makes you look senior instantly. Polyfill for bind is almost guaranteed.",
    schedule:[
      {dur:"1.5h", title:"4 Rules of this + Arrow functions", desc:"Default, implicit, explicit, new binding. Arrow = lexical this. Predict output of 10 puzzles."},
      {dur:"1h", title:"Polyfills: bind, call, apply", desc:"Write Function.prototype.myBind from scratch. Handle partial application and new keyword."},
      {dur:"0.5h", title:"Job Applications", desc:"Apply to 3–5 roles."},
    ],
    topics:[
      {id:"d3t1", name:"4 Rules of this Binding", tag:"core", imp:true,
       note:"Priority: new > explicit > implicit > default. Memorise this order.",
       sub:["Default: standalone fn call → global (undefined in strict mode)","Implicit: obj.fn() → this = obj","Explicit: call/apply/bind → this = first argument","new: constructor call → this = newly created object","Arrow functions: no own 'this', inherit from enclosing scope"]},
      {id:"d3t2", name:"call() vs apply() vs bind()", tag:"core", imp:true,
       note:"Return values: call/apply invoke immediately. bind returns new function.",
       sub:["call(thisArg, arg1, arg2) — invoke immediately, args spread","apply(thisArg, [args]) — invoke immediately, args as array","bind(thisArg, arg1) — returns NEW function, not invoked","Method borrowing: Array.prototype.slice.call(arguments)","Partial application with bind: fn.bind(null, firstArg)"]},
      {id:"d3t3", name:"Polyfill: Function.prototype.bind", tag:"core", imp:true, polyfill:true,
       note:"#2 most asked polyfill. Write from memory in under 5 minutes.",
       sub:["Capture 'this' context and pre-set args using closure","Return new function that calls original via apply","Handle pre-set arguments (partial application)","Handle new: if called with new, use newly created object as this","Check: if (this instanceof bound) — then ignore bound this"]},
      {id:"d3t4", name:"Arrow Functions vs Regular Functions", tag:"core", imp:true,
       note:"Arrow has no this, no arguments, no prototype. Cannot use as constructor.",
       sub:["Arrow captures 'this' from surrounding lexical scope","Cannot change arrow's this via call/apply/bind","No 'arguments' object in arrow — use rest params","Cannot use as constructor: new arrowFn() throws TypeError","Great for callbacks inside methods (preserves outer this)"]},

// ════════════════════════════
// STATE HELPERS
// ════════════════════════════
function getState() { try { return JSON.parse(localStorage.getItem('jsp_v3')||'{}'); } catch { return {}; } }
function saveState(s) { localStorage.setItem('jsp_v3', JSON.stringify(s)); }
function showToast() {
  const t = document.getElementById('toast');
  t.classList.add('show');
  clearTimeout(t._t);
  t._t = setTimeout(() => t.classList.remove('show'), 1500);
}

let selectedDay = null;

// ════════════════════════════
// SIDEBAR RENDER
// ════════════════════════════
function renderSidebar() {
  const state = getState();
  const list = document.getElementById('days-list');
  list.innerHTML = '';
  let totalT = 0, doneT = 0, doneD = 0;

  PLAN.forEach(day => {
    const ch = day.topics.filter(t => state[t.id]).length;
    const tot = day.topics.length;
    const pct = tot ? ch/tot : 0;
    if (pct===1 && tot>0) doneD++;
    totalT += tot; doneT += ch;

    const r=11, circ = 2*Math.PI*r;
    const offset = circ*(1-pct);
    const ringColor = pct===1?'var(--green)':pct>0?'var(--accent)':'var(--border)';
    const textColor = pct===1?'var(--green)':pct>0?'var(--accent)':'var(--muted)';

    const typeC = day.type==='weekend'?'type-weekend':day.type==='wfh'?'type-wfh':'type-workday';
    const bLabel = day.type==='weekend'?'WEEKEND':day.type==='wfh'?'WFH':'WORKDAY';
    const bClass = day.type==='weekend'?'badge-weekend':day.type==='wfh'?'badge-wfh':'badge-work';
    const weekN = day.day<=7?1:day.day<=14?2:3;
    const dn = day.dayName.split(' ')[0].toUpperCase().slice(0,3);
    const isActive = selectedDay===day.day;

    const el = document.createElement('div');
    el.className = `day-item ${typeC}${isActive?' active':''}`;
    el.dataset.day = day.day;
    el.dataset.week = weekN;
    el.onclick = () => selectDay(day.day);
    el.innerHTML = `
      <div class="di-num">D${day.day}</div>
      <div class="di-info">
        <div class="di-title">${day.title}</div>
        <div class="di-meta">
          <span class="di-dayname">${dn}</span>
          <span class="di-badge ${bClass}">${bLabel}</span>
        </div>
      </div>
      <div class="di-ring">
        <svg width="28" height="28" viewBox="0 0 28 28">
          <circle class="ring-bg2" cx="14" cy="14" r="${r}"/>
          <circle class="ring-fill2" cx="14" cy="14" r="${r}"
            stroke-dasharray="${circ.toFixed(2)}" stroke-dashoffset="${offset.toFixed(2)}"
            stroke="${ringColor}"/>
        </svg>
        <div class="ring-pct" style="color:${textColor}">${Math.round(pct*100)}%</div>
      </div>`;
    list.appendChild(el);
  });

  document.getElementById('stat-topics').textContent = `${doneT}/${totalT}`;
  document.getElementById('stat-days').textContent = `${doneD}/15`;
  const pct = totalT ? Math.round(doneT/totalT*100) : 0;
  document.getElementById('global-bar').style.width = pct+'%';
  document.getElementById('prog-pct').textContent = pct+'%';
}

// ════════════════════════════
// DETAIL RENDER
// ════════════════════════════
function selectDay(dayNum) {
  selectedDay = dayNum;
  renderSidebar();
  renderDetail(dayNum);
}

function topicHTML(t, state) {
  const ch = !!state[t.id];
  const tagMap = {core:['CORE','ttag-core'],advanced:['ADVANCED','ttag-advanced'],practical:['PRACTICAL','ttag-practical'],browser:['BROWSER','ttag-browser'],'html-css':['HTML/CSS','ttag-htmlcss']};
  const [tagLabel, tagClass] = tagMap[t.tag] || tagMap.core;
  return `
    <div class="topic-item${ch?' checked':''}${t.imp?' imp':''}" id="ti-${t.id}" onclick="toggleTopic('${t.id}')">
      <div class="topic-checkbox">
        <svg class="chk-icon" width="10" height="8" viewBox="0 0 10 8">
          <polyline points="1 4 3.5 7 9 1" stroke="currentColor" stroke-width="2" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
        </svg>
      </div>
      <div class="topic-body">
        <div class="topic-name-row">
          <span class="topic-name">${t.name}</span>
          ${t.imp?'<span class="imp-star">★ IMP</span>':''}
          ${t.polyfill?'<span class="poly-badge">POLYFILL</span>':''}
        </div>
        <div class="topic-tags"><span class="ttag ${tagClass}">${tagLabel}</span></div>
        <div class="topic-note">${t.note}</div>
        ${t.sub&&t.sub.length?`<div class="subtopics">${t.sub.map(s=>`<div class="st-item"><span class="st-dot">›</span><span>${s}</span></div>`).join('')}</div>`:''}
      </div>
    </div>`;
}

function renderDetail(dayNum) {
  const day = PLAN.find(d=>d.day===dayNum);
  if (!day) return;
  const state = getState();

  document.getElementById('empty-state').style.display = 'none';
  const inner = document.getElementById('detail-inner');
  inner.style.display = 'block';
  inner.className = 'detail-inner anim';
  setTimeout(()=>inner.classList.remove('anim'),300);

  const ch = day.topics.filter(t=>state[t.id]).length;
  const tot = day.topics.length;
  const pct = tot ? ch/tot : 0;
  const r=31, circ=2*Math.PI*r, offset=circ*(1-pct);
  const ringCol = pct===1?'var(--green)':pct>0?'var(--accent)':'var(--border)';
  const textCol = pct===1?'var(--green)':pct>0?'var(--accent)':'var(--muted)';

  const bClass = day.type==='weekend'?'badge-weekend':day.type==='wfh'?'badge-wfh':'badge-work';
  const typeLabel = day.type==='weekend'?'WEEKEND · 8h Study':day.type==='wfh'?'FRIDAY WFH · 4h Study':'WEEKDAY · 3h Study';

  const savedNote = state[`note_${dayNum}`]||'';
  const savedMood = state[`mood_${dayNum}`]||'';
  const moods = [{v:'great',e:'🔥',l:'Crushed it'},{v:'good',e:'✅',l:'Solid'},{v:'ok',e:'😐',l:'Average'},{v:'struggle',e:'😤',l:'Struggled'}];

  inner.innerHTML = `
    <div class="detail-day-header">
      <div>
        <div class="detail-day-label">
          <span style="font-family:'Space Mono',monospace">DAY ${day.day}</span>
          <span>·</span>
          <span>${day.dayName.toUpperCase()}</span>
        </div>
        <div class="detail-day-title">${day.title}</div>
        <div class="detail-day-sub">
          <span class="big-badge ${bClass}">${typeLabel}</span>
          <span style="font-size:12px;color:var(--muted)" id="day-progress-text">${ch}/${tot} topics done</span>
        </div>
        <div class="why-block">💡 ${day.why}</div>
      </div>
      <div class="detail-ring">
        <svg width="70" height="70" viewBox="0 0 70 70">
          <circle class="detail-ring-bg" cx="35" cy="35" r="${r}"/>
          <circle class="detail-ring-fill" id="detail-ring-fill" cx="35" cy="35" r="${r}"
            stroke-dasharray="${circ.toFixed(2)}" stroke-dashoffset="${offset.toFixed(2)}"
            stroke="${ringCol}"/>
        </svg>
        <div class="detail-ring-text" id="detail-ring-text" style="color:${textCol}">${Math.round(pct*100)}%</div>
      </div>
    </div>

    <div class="section-head">Daily Schedule</div>
    <div class="schedule-grid">
      ${day.schedule.map(s=>`
        <div class="sched-block">
          <div class="sched-dur">${s.dur}</div>
          <div>
            <div class="sched-title">${s.title}</div>
            ${s.desc?`<div class="sched-desc">${s.desc}</div>`:''}
          </div>
        </div>`).join('')}
    </div>

    <div class="section-head">Topics to Study</div>
    <div id="topics-grid">${day.topics.map(t=>topicHTML(t,state)).join('')}</div>

    ${day.resources&&day.resources.length?`
      <div class="section-head">Resources</div>
      <div class="resources">${day.resources.map(r=>`<a class="res-link" href="${r.url}" target="_blank">↗ ${r.label}</a>`).join('')}</div>
    `:''}

    <div class="section-head">Session Notes</div>
    <textarea class="notes-area" placeholder="Key insights, aha moments, things to revisit…"
      onblur="saveNote(${dayNum},this.value)"
      onchange="saveNote(${dayNum},this.value)">${savedNote}</textarea>

    <div class="section-head" style="margin-top:14px">Session Mood</div>
    <div class="mood-row">
      ${moods.map(m=>`<button class="mood-btn${savedMood===m.v?' selected':''}" onclick="saveMood(${dayNum},'${m.v}',this)">${m.e} ${m.l}</button>`).join('')}
    </div>`;

  document.getElementById('detail-panel').scrollTop = 0;
}

// ════════════════════════════
// ACTIONS
// ════════════════════════════
function toggleTopic(id) {
  const state = getState();
  state[id] = !state[id];
  saveState(state);
  showToast();

  const el = document.getElementById('ti-'+id);
  if (el) {
    const t = PLAN.flatMap(d=>d.topics).find(t=>t.id===id);
    if (t) el.outerHTML = topicHTML(t, state);
  }

  renderSidebar();

  // restore active sidebar item
  document.querySelectorAll('.day-item').forEach(el=>{
    if (parseInt(el.dataset.day)===selectedDay) el.classList.add('active');
  });

  // update ring in detail
  if (selectedDay) {
    const day = PLAN.find(d=>d.day===selectedDay);
    if (day) {
      const ch = day.topics.filter(t=>state[t.id]).length;
      const tot = day.topics.length;
      const pct = tot?ch/tot:0;
      const r=31, circ=2*Math.PI*r, offset=circ*(1-pct);
      const col = pct===1?'var(--green)':pct>0?'var(--accent)':'var(--border)';
      const el1=document.getElementById('detail-ring-fill');
      const el2=document.getElementById('detail-ring-text');
      const el3=document.getElementById('day-progress-text');
      if(el1){el1.setAttribute('stroke-dashoffset',offset.toFixed(2));el1.setAttribute('stroke',col);}
      if(el2){el2.textContent=Math.round(pct*100)+'%';el2.style.color=col;}
      if(el3) el3.textContent=`${ch}/${tot} topics done`;
    }
  }
}

function saveNote(dayNum, val) {
  const state = getState();
  state[`note_${dayNum}`] = val;
  saveState(state);
  showToast();
}

function saveMood(dayNum, mood, btn) {
  const state = getState();
  state[`mood_${dayNum}`] = mood;
  saveState(state);
  btn.closest('.mood-row').querySelectorAll('.mood-btn').forEach(b=>b.classList.remove('selected'));
  btn.classList.add('selected');
  showToast();
}

function filterWeek(week, btn) {
  document.querySelectorAll('.wf-btn').forEach(b=>b.classList.remove('active'));
  btn.classList.add('active');
  document.querySelectorAll('.day-item').forEach(el=>{
    el.classList.toggle('hidden', week!=='all' && el.dataset.week!=week);
  });
}

// INIT
renderSidebar();
selectDay(1);
</script>
</body>
</html>
